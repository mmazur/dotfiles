set -g mouse on
set -s set-clipboard on
set -g allow-passthrough on

# Ctrl+a is the tmux prefix; Ctrl+a Ctrl+a sends literal Ctrl+a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# CC wants this
set -g focus-events on

# Only spaces separate words for double-click selection
set -g word-separators ' '

# Tabs at the top (clickable thanks to mouse on)
if-shell 'hostname | grep -q "^fedora"' 'set -g status-style "bg=colour52 fg=white"'
if-shell 'hostname | grep -q "^ubuntu"' 'set -g status-style "bg=colour33 fg=black"'
set -g status on
set -g status-position top
set -g status-right ''

# Number windows starting at 1 so Alt+1 == first window
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Alt+1..9,0 and Alt+Shift+1..9,0 to jump to windows 1..9,10
# (Shift+digit produces the symbol above the digit on a US layout)
bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9
bind-key -n M-0 select-window -t :10

# Ctrl+b for custom bindings; Ctrl+b Ctrl+b sends literal Ctrl+b
bind-key -n C-b switch-client -T my-keys
bind-key -T my-keys f next-window
bind-key -T my-keys s previous-window
bind-key -T my-keys t new-window
bind-key -T my-keys d detach-client
bind-key -T my-keys [ swap-window -t -1 \; previous-window
bind-key -T my-keys ] swap-window -t +1 \; next-window
bind-key -T my-keys w display-popup -E "tmux ls | fzf | cut -d: -f1 | xargs tmux switch-client -t"
bind-key -T my-keys n display-popup -E "bash -c 't=\$(printf \"window\\nsession\" | fzf --prompt=\"Pick: \" --height=4); [ -z \"\$t\" ] && exit; read -rp \"New \$t name: \" name; tmux rename-\$t \"\$name\"'"
bind-key -T my-keys : command-prompt
bind-key -T my-keys C-b send-keys C-b

# Alt+ and Alt+Shift+ window controls
bind-key -n M-t new-window
bind-key -n M-f next-window
bind-key -n M-s previous-window
bind-key -n M-d detach-client
bind-key -n M-[ swap-window -t -1 \; previous-window
bind-key -n M-] swap-window -t +1 \; next-window
bind-key -n M-w display-popup -E "tmux ls | fzf | cut -d: -f1 | xargs tmux switch-client -t"
bind-key -n M-n display-popup -E "bash -c 't=\$(printf \"window\\nsession\" | fzf --prompt=\"Pick: \" --height=4); [ -z \"\$t\" ] && exit; read -rp \"New \$t name: \" name; tmux rename-\$t \"\$name\"'"

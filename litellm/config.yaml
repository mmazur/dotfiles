litellm_settings:
  drop_params: true

model_list:
  - model_name: gpt-*
    litellm_params:
       model: github_copilot/gpt-*

  - model_name: gemini-*
    litellm_params:
       model: github_copilot/gemini-*

  - model_name: claude-*
    litellm_params:
       model: github_copilot/claude-*


  - model_name: claude-opus-4-6
    litellm_params:
      model: github_copilot/claude-opus-4.6

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6

  - model_name: claude-sonnet-4-5
    litellm_params:
      model: github_copilot/claude-sonnet-4.5

  - model_name: claude-haiku-4-5
    litellm_params:
      model: github_copilot/claude-haiku-4.5
